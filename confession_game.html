<!-- ========================= -->
<!-- ✅ S1 달리기 수정 -->
<!-- ========================= -->

<script>
/* 기존 코드 유지 */

function startDashTimer(){
  clearInterval(S.dashTI);
  S.dashTimerVal=4;
  const tw=document.getElementById('dash-timer-wrap');tw.style.display='block';
  const el=document.getElementById('dash-timer');el.textContent=S.dashTimerVal;
  S.dashTI=setInterval(()=>{
    S.dashTimerVal--;el.textContent=S.dashTimerVal;
    if(S.dashTimerVal<=0){
      clearInterval(S.dashTI);

      /* 🔥 난이도 ↑ */
      const p=25+Math.floor(Math.random()*30);

      S.dist=Math.min(S.dist+p,350);
      S.maxDist=Math.max(S.maxDist,S.dist);

      document.getElementById('dist-num').textContent=S.dist;
      document.getElementById('dist-bar').style.width=(S.dist/S.maxDist*100)+'%';

      document.getElementById('dist-delta').textContent='⚠️ 너무 느려! +'+p+'m 거리 증가!';

      flashScreen('#ff0000',200);

      if(S.stamina>0){
        S.stamina--;
        const sb=document.getElementById('sb'+S.stamina);
        if(sb)sb.classList.remove('alive');
      }

      if(S.stamina<=0){
        S.stamina=1;
        const sb=document.getElementById('sb0');
        if(sb)sb.classList.add('alive');
      }

      startDashTimer();
    }
  },1000);
}

document.getElementById('btn-run').addEventListener('click',function(){

  clearInterval(S.dashTI);

  /* 🔥 난이도 ↑ (덜 줄어듦) */
  const r=10+Math.floor(Math.random()*8);

  S.dist=Math.max(0,S.dist-r);

  document.getElementById('dist-num').textContent=S.dist;
  document.getElementById('dist-bar').style.width=(S.dist/S.maxDist*100)+'%';
  document.getElementById('dist-delta').textContent='▼ -'+r+'m!';

  if(S.dist<=0){
    clearInterval(S.dashTI);
    document.getElementById('dash-timer-wrap').style.display='none';
    this.style.display='none';
    document.getElementById('btn-escape-room').style.display='block';
    document.getElementById('shake-text').textContent='🚪 탈출구가 보여!! 빨리!!';
  } else {
    startDashTimer();
  }
});
</script>

<!-- ========================= -->
<!-- ✅ S2 문짝 수정 -->
<!-- ========================= -->

<div id="door-streak-box">
연속 정답: <span id="streak-num">0</span> &nbsp;|&nbsp; 목표: <span id="streak-goal">2</span>연속
</div>

<script>
function onDoorClick(d){

  if(d.dataset.used==='1')return;
  d.dataset.used='1';

  if(d.dataset.safe==='1'){
    d.classList.add('correct');
    S.doorStreak++;

    document.getElementById('streak-num').textContent=S.doorStreak;
    rotateShadow();

    /* 🔥 난이도 ↓ */
    if(S.doorStreak>=2){
      setTimeout(()=>{
        document.getElementById('door-grid').style.display='none';
        document.getElementById('btn-door-next').style.display='block';
      },500);
    } else {
      setTimeout(buildDoors,600);
    }

  } else {
    d.classList.add('wrong');
    flashScreen('#ff0000',160);

    S.doorStreak=0;
    document.getElementById('streak-num').textContent=0;

    S.doorHP--;

    if(S.doorHP>=0){
      const h=document.getElementById('hp'+S.doorHP);
      if(h){
        h.classList.add('lost');
        h.textContent='🖤';
      }
    }

    if(S.doorHP<=0){
      document.getElementById('door-grid').style.display='none';
      document.getElementById('door-dead-box').style.display='block';
      document.getElementById('btn-retry-door').style.display='block';
    } else {
      setTimeout(buildDoors,600);
    }
  }
}
</script>
