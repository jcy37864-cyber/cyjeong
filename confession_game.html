<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💀 SCARE — 소연에게 (HARD MODE)</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* 원본 디자인 유지 */
:root {
  --h-bg:#080808;--h-text:#ff2222;--h-dim:#991111;
  --l-bg:#fff5f7;--l-text:#c0194a;--l-accent:#ff4b7b;
  --font-main:'Black Han Sans',sans-serif;--font-body:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--h-bg);color:var(--h-text);transition:background 1s;overflow-x:hidden;display:flex;justify-content:center;}
#game{width:100%;max-width:580px;padding:2rem 1.5rem;min-height:100vh;display:flex;flex-direction:column;gap:1.4rem;}
.stage{display:none;flex-direction:column;gap:1.3rem;animation:fadeIn .45s ease;}
.stage.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.title-horror{font-family:var(--font-main);font-size:2.1rem;color:var(--h-text);text-align:center;text-shadow:0 0 30px rgba(255,34,34,.55);}
.btn{width:100%;padding:.95rem;font-family:var(--font-main);font-size:1.1rem;border-radius:10px;cursor:pointer;transition:all .16s;}
.btn-horror{background:#0f0f0f;color:var(--h-text);border:2px solid var(--h-dim);}
.load-bar-outer{background:#111;border-radius:99px;height:18px;border:1px solid #330000;overflow:hidden;}
.load-bar-inner{height:100%;width:0%;background:linear-gradient(90deg,#660000,#ff0000);transition:width 0.1s;}
.prog-wrap{background:#1a0000;border-radius:99px;height:13px;overflow:hidden;border:1px solid #330000;}
.prog-bar{height:100%;background:linear-gradient(90deg,#ff0000,#ff6644);transition:width .35s;}
.door-grid, .heart-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.door-card, .heart-cell{aspect-ratio:1;border-radius:10px;border:2px solid #2a0000;background:#0a0000;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;}
#thread-arena{position:relative;width:100%;height:380px;background:#030010;border-radius:14px;border:2px solid #1a0030;overflow:hidden;}
.thread-item{position:absolute;cursor:pointer;font-size:1.8rem;}
.flash-overlay{position:fixed;inset:0;background:red;opacity:0;pointer-events:none;transition:opacity .1s;}
</style>
</head>
<body>

<div id="game">
  <div class="stage active" id="s0">
    <div class="title-horror">👁️ SYSTEM BREACH</div>
    <div id="load-wrap" style="display:none; flex-direction:column; gap:1rem;">
      <div class="load-bar-outer"><div class="load-bar-inner" id="load-bar"></div></div>
      <div id="load-msg" style="text-align:center; font-size:0.9rem;">데이터 침투 중...</div>
    </div>
    <button class="btn btn-horror" id="btn-s0-start">🩸 권한 강제 탈취 (시작)</button>
    <button class="btn btn-horror" id="btn-s0-enter" style="display:none">💀 입장하기</button>
  </div>

  <div class="stage" id="s1">
    <div class="title-horror">🏃 뒤를 돌아보지 마!</div>
    <div style="text-align:center; font-size:2rem;">거리: <span id="dist-num">200</span>m</div>
    <div class="prog-wrap"><div class="prog-bar" id="dist-bar" style="width:100%"></div></div>
    <button class="btn btn-horror" id="btn-run">🏃 광클해서 도망쳐!!</button>
    <button class="btn btn-horror" id="btn-s1-next" style="display:none">🚪 탈출구 발견</button>
  </div>

  <div class="stage" id="s25">
    <div class="title-horror">🎰 죽음의 룰렛</div>
    <div id="spin-result" style="text-align:center; font-size:3rem; margin:1rem;">❓</div>
    <button class="btn btn-horror" id="btn-spin">룰렛 돌리기</button>
    <button class="btn btn-horror" id="btn-s25-next" style="display:none">🩸 틈으로 탈출</button>
  </div>

  <div class="stage" id="s5">
    <div class="title-horror" style="color:pink;">💖 마음 모으기</div>
    <div style="text-align:center; margin-bottom:10px;">하트: <span id="heart-count">0</span> / 18</div>
    <div class="heart-grid" id="heart-grid"></div>
    <button class="btn btn-horror" id="btn-s5-next" style="display:none">🧵 실 찾기</button>
  </div>

  <div class="stage" id="s6">
    <div class="title-horror" style="color:purple;">🧵 운명의 실</div>
    <div style="text-align:center;">남은 기회: <span id="thread-tries">2</span></div>
    <div id="thread-arena"></div>
    <button class="btn btn-horror" id="btn-s6-next" style="display:none">💌 마지막으로</button>
  </div>
</div>

<div class="flash-overlay" id="flash"></div>

<script>
const S = { dist: 200, hearts: 0, tries: 2 };

function go(id) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// S0 로딩 로직 수정
document.getElementById('btn-s0-start').onclick = function() {
  this.style.display = 'none';
  document.getElementById('load-wrap').style.display = 'flex';
  let p = 0;
  const bar = document.getElementById('load-bar');
  const iv = setInterval(() => {
    p += 2;
    bar.style.width = p + '%';
    if (p >= 100) {
      clearInterval(iv);
      document.getElementById('btn-s0-enter').style.display = 'block';
    }
  }, 50);
};

document.getElementById('btn-s0-enter').onclick = () => go('s1');

// S1 달리기 상향 (1회 클릭당 3m 전진)
document.getElementById('btn-run').onclick = function() {
  S.dist -= 3;
  if (S.dist <= 0) {
    S.dist = 0;
    this.style.display = 'none';
    document.getElementById('btn-s1-next').style.display = 'block';
  }
  document.getElementById('dist-num').textContent = S.dist;
  document.getElementById('dist-bar').style.width = (S.dist / 200 * 100) + '%';
};

document.getElementById('btn-s1-next').onclick = () => go('s25');

// S2.5 룰렛 상향 (1/8 확률)
document.getElementById('btn-spin').onclick = function() {
  const res = Math.random() < 0.125 ? '✅ 통과' : '💀 꽝';
  document.getElementById('spin-result').textContent = res;
  if (res === '✅ 통과') {
    this.style.display = 'none';
    document.getElementById('btn-s25-next').style.display = 'block';
  } else {
    flash();
  }
};

document.getElementById('btn-s25-next').onclick = () => { buildHearts(); go('s5'); };

// S5 하트 상향 (18개 목표 & 감점)
function buildHearts() {
  const g = document.getElementById('heart-grid'); g.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const c = document.createElement('div'); c.className = 'heart-cell';
    const isH = Math.random() > 0.8;
    c.textContent = isH ? '💖' : '🤍';
    c.onclick = () => {
      if (isH) S.hearts++;
      else { S.hearts = Math.max(0, S.hearts - 1); flash(); }
      document.getElementById('heart-count').textContent = S.hearts;
      if (S.hearts >= 18) {
        g.style.display = 'none';
        document.getElementById('btn-s5-next').style.display = 'block';
      } else buildHearts();
    };
    g.appendChild(c);
  }
}

document.getElementById('btn-s5-next').onclick = () => { buildThreads(); go('s6'); };

// S6 운명의 실 상향 (30개 중 1개 & 기회 2번)
function buildThreads() {
  const a = document.getElementById('thread-arena'); a.innerHTML = '';
  const win = Math.floor(Math.random() * 30);
  for (let i = 0; i < 30; i++) {
    const t = document.createElement('div'); t.className = 'thread-item';
    t.textContent = '🧵';
    t.style.left = Math.random() * 90 + '%'; t.style.top = Math.random() * 90 + '%';
    t.onclick = () => {
      if (i === win) {
        t.style.fontSize = '4rem';
        document.getElementById('btn-s6-next').style.display = 'block';
      } else {
        S.tries--; flash();
        document.getElementById('thread-tries').textContent = S.tries;
        if (S.tries <= 0) { alert('실이 끊어졌습니다!'); location.reload(); }
      }
    };
    a.appendChild(t);
  }
}

function flash() {
  const f = document.getElementById('flash');
  f.style.opacity = '0.5';
  setTimeout(() => f.style.opacity = '0', 100);
}
</script>
</body>
</html>
