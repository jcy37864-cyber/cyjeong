<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💀 SCARE — 소연에게</title>

<style>
body{background:#080808;color:#ff2222;font-family:sans-serif;text-align:center;padding:20px;}
button{padding:10px 20px;margin:10px;font-size:18px;cursor:pointer;}
</style>
</head>

<body>

<h1>💀 게임 시작</h1>

<div id="stage1">
<h2>🏃 달리기</h2>
<p id="dist">200</p>
<button onclick="run()">달려!</button>
</div>

<div id="stage2" style="display:none">
<h2>🚪 문 선택</h2>
<p>연속 성공: <span id="streak">0</span> / 2</p>
<button onclick="door()">문 선택</button>
</div>

<div id="stage3" style="display:none">
<h2>🎰 룰렛</h2>
<p>연속 성공: <span id="combo">0</span> / 3</p>
<button onclick="roulette()">돌려!</button>
</div>

<script>
let dist=200;
let streak=0;
let combo=0;

/* ===== 달리기 ===== */
function run(){
  let decrease = 10 + Math.floor(Math.random()*8); // 🔥 덜 줄어듦
  dist -= decrease;

  let penalty = 25 + Math.floor(Math.random()*30); // 🔥 더 쫓김
  dist += Math.random()<0.3 ? penalty : 0;

  document.getElementById("dist").innerText=dist;

  if(dist<=0){
    document.getElementById("stage1").style.display="none";
    document.getElementById("stage2").style.display="block";
  }
}

/* ===== 문짝 ===== */
function door(){
  if(Math.random()<0.5){
    streak++;
  }else{
    streak=0;
  }

  document.getElementById("streak").innerText=streak;

  if(streak>=2){ // 🔥 4 → 2
    document.getElementById("stage2").style.display="none";
    document.getElementById("stage3").style.display="block";
  }
}

/* ===== 룰렛 ===== */
function roulette(){
  if(Math.random()<0.5){
    combo++;
  }else{
    combo=0;
  }

  document.getElementById("combo").innerText=combo;

  if(combo>=3){ // 🔥 2 → 3
    alert("🎉 성공! 고백 완료!");
  }
}
</script>

</body>
</html>
